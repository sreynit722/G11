<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Website</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f4f4;
}

/* ===== NAVBAR ===== */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    background:#3b2314;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 50px;
    z-index:1000;
}

.logo{
    color:white;
    font-size:22px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:#fff;
    font-size:15px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#c89b6d;
}

.search{
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

/* ===== HERO SECTION ===== */
.hero{
    height:100vh;
    background: url("/mnt/data/8e3b383f-efc4-4561-ae44-9791d55296e1.png") no-repeat center center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.hero-content{
    position:relative;
    color:#fff;
    max-width:700px;
}

.hero h1{
    font-size:40px;
    font-weight:700;
    margin-bottom:20px;
}

.hero p{
    font-size:16px;
    margin-bottom:30px;
    line-height:1.6;
}

.btn{
    display:inline-block;
    padding:12px 30px;
    background:#c89b6d;
    color:white;
    border-radius:30px;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.btn:hover{
    background:#a87c4f;
}

.arrow{
    margin-top:40px;
    font-size:30px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce{
    0%,20%,50%,80%,100%{
        transform:translateY(0);
    }
    40%{
        transform:translateY(-10px);
    }
    60%{
        transform:translateY(-5px);
    }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">☕ Coffee</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Menu</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
    </div>

    <div class="search">🔍</div>
</div>

<!-- HERO SECTION -->
<section class="hero">
    <div class="hero-content">
        <h1>Freshly Brewed Coffee</h1>
        <p>Enjoy the rich aroma and smooth taste of our premium coffee beans. 
        Start your day with energy and warmth.</p>
        <a href="#" class="btn">Order Now</a>

        <div class="arrow">⌄</div>
    </div>
</section>

</body>
</html>
